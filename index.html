<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Boccaccio Trattatello — Confronto versioni</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Boccaccio Trattatello — Confronto versioni</h1>
    <p class="subtitle">Versione 1 (completa) vs Versione 2 (compendiata)</p>
  </header>

  <main id="main">
    <div class="controls">
      <button id="toggle-anno">Mostra/Nascondi annotazioni</button>
    </div>

    <div class="grid" id="grid">
      <div class="col header-col">
        <h2>Versione 1</h2>
      </div>
      <div class="col header-col">
        <h2>Versione 2</h2>
      </div>
      <!-- Le righe conterranno le celle generate da scripts.js -->
    </div>
  </main>

  <footer>
    <small>Prototipo — testi di esempio. Quando sei pronto carichiamo i testi reali.</small>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
